schema_version: 1

context:
  version: "0.4.2"

package:
  name: agate-excel
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agate-excel/agate_excel-${{ version }}.tar.gz
  sha256: eed1dc6239f0e96720d962dc1bdfb4496e19687332c827fd8b1e587a917ea202

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - agate >=1.5.0
    - openpyxl >=2.3.0
    - xlrd >=0.9.4
    - olefile

tests:
  - python:
      imports:
        - agateexcel
      pip_check: true
      python_version: ${{ python_min }}

about:
  license_file: COPYING
  license: MIT
  summary: agate-excel adds read support for Excel files (xls and xlsx) to agate.
  homepage: https://agate-excel.readthedocs.org/
  repository: https://github.com/wireservice/agate-excel
  documentation: https://agate-excel.readthedocs.org/

extra:
  recipe-maintainers:
    - pmlandwehr
    - jan-janssen
